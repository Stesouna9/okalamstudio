<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>OKALAM Studio</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
color:white;
text-align:center;
overflow-x:hidden;

background-image:url("okalam.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* DARK OVERLAY */

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-top:120px;
padding-bottom:120px;
}

/* TRIANGLE LIGHT */

.triangle-glow{

position:absolute;
top:35%;
left:50%;

transform:translate(-50%,-50%);

width:700px;
height:700px;

background:radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);

animation:glow 7s ease-in-out infinite;

pointer-events:none;

}

@keyframes glow{

0%{opacity:0.2;}
50%{opacity:0.45;}
100%{opacity:0.2;}

}
