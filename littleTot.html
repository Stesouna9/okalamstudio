<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Little ToT</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
color:white;
text-align:center;

background-image:url("okalam.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding-top:100px;
padding-bottom:60px;
}

h1{
font-size:56px;
margin-bottom:30px;
}

.game-img{
width:400px;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.8);
margin-bottom:40px;
}

.desc{
font-size:20px;
color:#ddd;
margin-bottom:20px;
}

.release{
color:#aaa;
font-size:18px;
margin-bottom:40px;
}

.button{
display:inline-block;
padding:10px 20px;
background:#0071e3;
border-radius:10px;
color:white;
text-decoration:none;
}

.lang{
position:fixed;
top:20px;
left:20px;
}

.lang button{
margin-right:5px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>


<body>

<div class="lang">

<button onclick="setLang('fr')">🇫🇷 FR</button>
<button onclick="setLang('en')">🇬🇧 ENG</button>

</div>


<div class="overlay">

<h1>Little ToT</h1>

<img src="ltot.png" class="game-img">

<p class="desc" id="desc">

Une aventure narrative calme où les choix changent l'histoire.

</p>

<p class="release" id="release">

Sortie prévue en 2026

</p>

<a href="index.html" class="button">

Back

</a>

</div>


<script>

function setLang(lang){

if(lang==="en"){

document.getElementById("desc").innerText =
"Little ToT is a calm narrative adventure where choices shape the journey.";

document.getElementById("release").innerText =
"Release planned for 2026";

}

if(lang==="fr"){

document.getElementById("desc").innerText =
"Une aventure narrative calme où les choix changent l'histoire.";

document.getElementById("release").innerText =
"Sortie prévue en 2026";

}

}

</script>


</body>
</html>
