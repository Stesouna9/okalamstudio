name: Update Creator Stats

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch stats from Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node scripts/fetch-stats.js

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update creator stats [skip ci]" && git push)
